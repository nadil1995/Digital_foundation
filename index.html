<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SetupDesk | Websites, Business Email & Business Plans for UK Businesses</title>
    <meta name="description" content="SetupDesk helps UK sole traders and small businesses get online fast. Professional websites, business email setup, and business plans from £349. Based in South Croydon, London." />
    <meta name="keywords" content="UK small business website, business email setup UK, business plan UK, Shopify UK, WordPress UK, Google Workspace setup, Microsoft 365 setup, SEO UK, sole trader website, SetupDesk" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.setupdesk.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.setupdesk.co.uk/" />
    <meta property="og:title"       content="SetupDesk | Digital Foundations for UK Businesses" />
    <meta property="og:description" content="Websites, business email, and business plans for UK sole traders and small businesses. Starting from £349. Online in days." />
    <meta property="og:image"       content="https://www.setupdesk.co.uk/og-image.png" />
    <meta property="og:locale"      content="en_GB" />
    <meta property="og:site_name"   content="SetupDesk" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://www.setupdesk.co.uk/" />
    <meta name="twitter:title"       content="SetupDesk | Digital Foundations for UK Businesses" />
    <meta name="twitter:description" content="Websites, business email, and business plans for UK sole traders and small businesses. Starting from £349." />
    <meta name="twitter:image"       content="https://www.setupdesk.co.uk/og-image.png" />

    <!-- Geo / Local SEO -->
    <meta name="geo.region"    content="GB-ENG" />
    <meta name="geo.placename" content="South Croydon, London" />
    <meta name="geo.position"  content="51.3611;-0.0919" />
    <meta name="ICBM"          content="51.3611, -0.0919" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "SetupDesk",
      "description": "SetupDesk helps UK sole traders and small businesses get online with professional websites, business email, and business plans.",
      "url": "https://www.setupdesk.co.uk",
      "logo": "https://www.setupdesk.co.uk/logo.png",
      "image": "https://www.setupdesk.co.uk/og-image.png",
      "email": "hello@setupdesk.co.uk",
      "telephone": "+442012345678",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "South Croydon",
        "addressRegion": "London",
        "addressCountry": "GB"
      },
      "areaServed": { "@type": "Country", "name": "United Kingdom" },
      "priceRange": "££",
      "openingHours": "Mo-Fr 09:00-18:00",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Digital Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Starter Website Package" }, "price": "349",  "priceCurrency": "GBP" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Growth Website Package"  }, "price": "699",  "priceCurrency": "GBP" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Premium Website Package" }, "price": "1299", "priceCurrency": "GBP" }
        ]
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SetupDesk",
      "url": "https://www.setupdesk.co.uk"
    }
    </script>

    <!-- Structured Data: FAQPage (Google rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "How much does a small business website cost in the UK?",
          "acceptedAnswer": { "@type": "Answer", "text": "Our packages start from £349 for a professional 1-page website including domain, business email, and a contact form. A 5-page Growth website with SEO and Google Business setup is £699." } },
        { "@type": "Question", "name": "How long does it take to build my website?",
          "acceptedAnswer": { "@type": "Answer", "text": "Most websites are delivered within 24–48 hours of you approving the plan. Complex projects typically take 3–5 days." } },
        { "@type": "Question", "name": "I already have a domain — can you still build my site?",
          "acceptedAnswer": { "@type": "Answer", "text": "Absolutely. We connect your existing domain from any registrar to your new site. We handle all DNS configuration." } },
        { "@type": "Question", "name": "Can you set up Google Workspace or Microsoft 365 for my business email?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. We set up professional business email on Google Workspace or Microsoft 365, including DNS, MX records, and onboarding." } },
        { "@type": "Question", "name": "Is my website GDPR compliant?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. All SetupDesk websites are built to UK GDPR standards — including cookie consent, privacy policy, and secure forms." } },
        { "@type": "Question", "name": "Can you add a chatbot to my website?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. We integrate AI-powered chatbots for FAQs, lead capture, support, or bookings for £149." } },
        { "@type": "Question", "name": "What platforms do you build websites on?",
          "acceptedAnswer": { "@type": "Answer", "text": "We build on WordPress, Shopify, and Wix depending on your business needs." } },
        { "@type": "Question", "name": "Do you work with sole traders and limited companies?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — we work with sole traders, freelancers, partnerships, and limited companies across the UK." } }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
