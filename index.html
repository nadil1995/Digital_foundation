<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SetupDesk | Websites, Business Email & Business Plans for UK Businesses</title>
    <meta name="description" content="SetupDesk helps UK sole traders and small businesses get online fast. Professional websites, business email setup, and business plans from £349. Based in South Croydon, London." />
    <meta name="keywords" content="UK small business website, business email setup UK, business plan UK, Shopify UK, WordPress UK, Google Workspace setup, Microsoft 365 setup, SEO UK, sole trader website, SetupDesk" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.setupdesk.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.setupdesk.co.uk/" />
    <meta property="og:title"       content="SetupDesk | Digital Foundations for UK Businesses" />
    <meta property="og:description" content="Websites, business email, and business plans for UK sole traders and small businesses. Starting from £349. Online in days." />
    <meta property="og:image"       content="https://www.setupdesk.co.uk/og-image.png" />
    <meta property="og:locale"      content="en_GB" />
    <meta property="og:site_name"   content="SetupDesk" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://www.setupdesk.co.uk/" />

    <meta name="twitter:description" content="Websites, business email, and business plans for UK sole traders and small businesses. Starting from £349." />
    <meta name="twitter:image"       content="https://www.setupdesk.co.uk/og-image.png" />

    <!-- Geo / Local SEO -->
    <meta name="geo.region"    content="GB-ENG" />
    <meta name="geo.placename" content="South Croydon, London" />
    <meta name="geo.position"  content="51.3611;-0.0919" />
    <meta name="ICBM"          content="51.3611, -0.0919" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "SetupDesk",
      "description": "SetupDesk helps UK sole traders and small businesses get online with professional websites, business email, and business plans.",
      "url": "https://www.setupdesk.co.uk",
      "logo": "https://www.setupdesk.co.uk/logo.png",
      "image": "https://www.setupdesk.co.uk/og-image.png",
      "email": "hello@setupdesk.co.uk",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "South Croydon",
        "addressRegion": "London",
        "addressCountry": "GB"
      },
      "areaServed": { "@type": "Country", "name": "United Kingdom" },
      "priceRange": "££",
      "openingHours": "Mo-Fr 09:00-18:00",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Digital Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Starter Website Package" }, "price": "349",  "priceCurrency": "GBP" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Growth Website Package"  }, "price": "699",  "priceCurrency": "GBP" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Premium Website Package" }, "price": "1299", "priceCurrency": "GBP" }
        ]
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SetupDesk",
      "url": "https://www.setupdesk.co.uk"
    }
    </script>

    <!-- Structured Data: FAQPage (Google rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much does a small business website cost in the UK?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our packages start from £349 for a professional 1-page website including domain, business email, and a contact form. A 5-page Growth website with SEO and Google Business setup is £699. Prices are transparent — no hidden fees, no monthly platform costs forced on you."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to build my website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most websites are delivered within 24–48 hours of you approving the plan. Complex projects like e-commerce stores or 10-page sites typically take 3–5 days. We always give you a clear timeline upfront before we start."
          }
        },
        {
          "@type": "Question",
          "name": "I already have a domain — can you still build my site?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. If you have an existing domain with GoDaddy, Namecheap, 123-reg, or any other registrar, we'll connect it to your new site. We just need access to your DNS settings — we'll guide you through it step by step."
          }
        },
        {
          "@type": "Question",
          "name": "Can you set up Google Workspace or Microsoft 365 for my business email?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — this is one of our most popular services. We set up professional email (e.g. hello@yourbusiness.co.uk) on either Google Workspace or Microsoft 365, including DNS configuration, MX records, and basic onboarding. We can also migrate your existing emails."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to know anything technical?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not at all. We handle everything — domain, hosting, DNS, email setup, SEO, and more. We explain things in plain English and hand everything over with clear instructions. You'll know how to update your site and access your email without needing a developer."
          }
        },
        {
          "@type": "Question",
          "name": "What platforms do you build websites on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We build on WordPress, Shopify, and Wix depending on your needs. WordPress is best for content-heavy or service businesses, Shopify for e-commerce, and Wix for fast and simple sites. We recommend the right one for your situation during the free consultation."
          }
        },
        {
          "@type": "Question",
          "name": "Is my website GDPR compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All SetupDesk websites are built to UK GDPR standards — including cookie consent notices, a privacy policy, and secure contact forms. We're UK-based and understand your legal obligations as a business operating in England, Scotland, Wales, or Northern Ireland."
          }
        },
        {
          "@type": "Question",
          "name": "What is a business plan and do I need one?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A business plan is a written document that outlines your business goals, target market, revenue model, and financial projections. Banks, investors, and grant bodies require one before approving funding. Our plans are investor-ready PDF documents, professionally written and tailored to your business."
          }
        },
        {
          "@type": "Question",
          "name": "Can you add a chatbot to my website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We integrate AI-powered chatbots that can answer FAQs, capture leads, handle support queries, or take bookings — 24/7, without you lifting a finger. The chatbot is trained on your business information and embedded directly into your site for £149."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after my website goes live?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every package includes post-launch support — from 1 month on Starter to 6 months priority support on Premium. We also offer monthly retainer plans from £49/mo for ongoing maintenance, updates, and SEO monitoring. You're never left on your own."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with sole traders and limited companies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — we work with sole traders, freelancers, partnerships, and limited companies across the UK. Whether you're just starting out or established and need a refresh, we have a package that fits."
          }
        },
        {
          "@type": "Question",
          "name": "Can I upgrade my package later?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Of course. You can start with the Starter package and upgrade at any time. We keep your project files and can expand your site, add e-commerce, or move you onto a retainer plan whenever you're ready."
          }
        }
      ]
    }
    </script>
